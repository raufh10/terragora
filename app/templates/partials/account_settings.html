<div class="stack">

  {% if success %}
    <div class="stack p-sm" style="border-left: 3px solid #22c55e; padding-left:1rem;">
      <strong>Saved</strong>
      <p class="muted">{{ success }}</p>
    </div>
  {% endif %}
  {% if error %}
    <div class="stack p-sm" style="border-left: 3px solid #ef4444; padding-left:1rem;">
      <strong>Error</strong>
      <p class="muted">{{ error }}</p>
    </div>
  {% endif %}

  <!-- 1) PROFILE -->
  <div class="stack">
    <h4>Profile</h4>
    <form
      class="stack"
      hx-post="/settings/account/save-profile"
      hx-target="#settings-panel"
      hx-swap="innerHTML"
      hx-indicator="#settings-indicator"
      hx-disabled-elt="find button, find input"
      @submit.prevent="$el.submit()">

      <label class="input-block">
        <span>Name</span>
        <input type="text"
               name="name"
               class="input"
               placeholder="{{ current_name or 'Your name' }}">
      </label>

      <label class="input-block">
        <span>Email</span>
        <input type="email"
               name="email"
               class="input"
               placeholder="{{ current_email or '' }}"
               autocomplete="email"
               required>
      </label>

      <button class="btn">Save profile</button>
    </form>
  </div>

  <hr />

  <!-- 2) AGENDA -->
  <div class="stack">
    <h4>Agenda</h4>

    <form
      class="stack"
      hx-post="/settings/agenda/update"
      hx-target="#settings-panel"
      hx-swap="innerHTML"
      hx-indicator="#settings-indicator"
      hx-disabled-elt="find button, find input"
      @submit.prevent="$el.submit()">

      <label class="input-block">
        <span>Agenda name</span>
        <input type="text" name="agenda_name" class="input" required value="{{ agenda.agenda_name }}">
      </label>

      <label class="input-block">
        <span>Subreddit</span>
        <input type="text" name="subreddit" class="input" required value="{{ agenda.subreddit }}">
      </label>

      <label class="input-block">
        <span>Type</span>
        <select name="data_type" class="input" required>
          {% for opt in type_options %}
            <option value="{{ opt }}" {% if opt == agenda.data.type %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </label>

      <label class="input-block">
        <span>Location</span>
        <select name="data_location" class="input" required>
          {% for opt in location_options %}
            <option value="{{ opt }}" {% if opt == agenda.data.location %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </label>

      <button class="btn">Save changes</button>
    </form>
  </div>

  <hr />

  <!-- 3) PASSWORD RESET -->
  <div class="stack">
    <h4>Password</h4>
    <form
      class="stack"
      hx-post="/settings/account/reset-password"
      hx-target="#settings-panel"
      hx-swap="innerHTML"
      hx-indicator="#settings-indicator"
      hx-disabled-elt="find button, find input"
      @submit.prevent="$el.submit()">
      <input type="hidden" name="email" value="{{ current_email or '' }}">
      <button class="btn">Send reset link</button>
    </form>
  </div>

  <hr />

  <!-- 4) DELETE ACCOUNT -->
  <div class="stack" x-data="{ open:false, confirm:'' }">
    <h4>Delete account</h4>

    <button class="danger" @click="open = !open" x-text="open ? 'Cancel' : 'Delete account'"></button>

    <template x-if="open">
      <form
        class="stack mt"
        hx-post="/settings/account/delete"
        hx-target="#settings-panel"
        hx-swap="innerHTML"
        hx-indicator="#settings-indicator"
        @submit.prevent="$el.submit()">

        <p class="muted">Type <code>DELETE</code> to confirm.</p>

        <input
          class="input"
          type="text"
          name="confirm"
          placeholder="DELETE"
          x-model="confirm"
          required>

        <button class="danger" :disabled="confirm !== 'DELETE'">Confirm delete</button>
      </form>
    </template>
  </div>

</div>
