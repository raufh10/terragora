<div data-panel="forgot">
  <form
    class="stack"
    hx-post="/auth/forgot"
    hx-target="#account-panel"
    hx-swap="innerHTML"
    hx-indicator="#account-indicator"
    hx-disabled-elt="find button, find input"
    @submit.prevent="$el.submit()"
  >
    <h3>Reset password</h3>

    <p class="muted">Enter your email and we’ll send a reset link.</p>

    <label class="input-block">
      <span>Email</span>
      <input type="email" name="email" required class="input" autocomplete="email" />
    </label>

    <button class="btn">Send reset link</button>
  </form>

  <div class="muted mt center">
    Remembered your password?
    <a href="#"
       @click.prevent
       hx-get="/auth/partials/login"
       hx-target="#account-panel"
       hx-swap="innerHTML">Back to log in</a>
  </div>
</div>
