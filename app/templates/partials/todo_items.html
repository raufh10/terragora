<ul class="list">
  {% if todos and todos|length > 0 %}
    {% for t in todos %}
      <li class="item">
        <form
          class="inline"
          hx-post="/todos/{{ t.id }}/toggle"
          hx-target="#todo-list"
          hx-swap="innerHTML"
        >
          <button class="toggle" title="Toggle done" aria-label="Toggle done">
            {{ "✓" if t.done else "○" }}
          </button>
        </form>

        <span class="title {{ 'done' if t.done }}">{{ t.title }}</span>

        <form
          class="inline push-right"
          hx-post="/todos/{{ t.id }}/delete"
          hx-target="#todo-list"
          hx-swap="innerHTML"
        >
          <button class="danger" title="Delete" aria-label="Delete">Delete</button>
        </form>
      </li>
    {% endfor %}
  {% else %}
    <li class="muted">No tasks yet. Add your first one above.</li>
  {% endif %}
</ul>
