<form
  id="feed-controls"
  class="row gap card"
  hx-get="/feed"
  hx-target="#feed-list"
  hx-swap="innerHTML"
>
  <div class="row gap">
    <label class="input-group">
      <span>Sort</span>
      <select name="sort" class="input">
        <option value="hot" {{ 'selected' if current.sort == 'hot' }}>Hot</option>
        <option value="new" {{ 'selected' if current.sort == 'new' }}>New</option>
        <option value="top" {{ 'selected' if current.sort == 'top' }}>Top</option>
        <option value="rising" {{ 'selected' if current.sort == 'rising' }}>Rising</option>
      </select>
    </label>

    <label class="input-group">
      <span>Time</span>
      <select name="time" class="input">
        <option value="day" {{ 'selected' if current.time == 'day' }}>Day</option>
        <option value="week" {{ 'selected' if current.time == 'week' }}>Week</option>
        <option value="month" {{ 'selected' if current.time == 'month' }}>Month</option>
        <option value="year" {{ 'selected' if current.time == 'year' }}>Year</option>
        <option value="all" {{ 'selected' if current.time == 'all' }}>All</option>
      </select>
    </label>

    <label class="input-group">
      <span>Subreddit</span>
      <input type="text" name="subreddit" class="input" placeholder="e.g. jobs" value="{{ current.subreddit or '' }}">
    </label>

    <label class="input-group">
      <span>Min score</span>
      <input type="number" name="min_score" class="input" min="0" step="1" value="{{ current.min_score or 0 }}">
    </label>

    <label class="input-group">
      <span>Query</span>
      <input type="text" name="q" class="input" placeholder="Search title…" value="{{ current.q or '' }}">
    </label>
  </div>

  <div class="row gap">
    <button class="btn">Apply</button>
    <button class="btn outline"
            hx-get="/feed"
            hx-target="#feed-list"
            hx-vals='{"reset": "1"}'
            hx-swap="innerHTML"
            type="button">Reset</button>
  </div>
</form>
