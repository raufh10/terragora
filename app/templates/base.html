<!doctype html>
<html lang="en" x-data="{ dark: false, showModal:false }" :class="dark ? 'dark' : ''">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ self.title() if self.title is defined else 'App' }}</title>

    <!-- HTMX + Alpine via CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x" defer></script>

    <link rel="stylesheet" href="/static/styles.css" />
    <meta name="htmx-config" content='{"refreshOnHistoryMiss": true}' />
  </head>
  <body class="min-h-screen bg-surface text-ink">
    <header class="container">
      <div class="row between items-center">
        <h1 class="brand">
          FastAPI · Jinja2 · HTMX · Alpine
        </h1>

        <div class="row gap">
          <!-- Theme toggle -->
          <button class="btn" @click="dark = !dark" x-text="dark ? 'Light' : 'Dark'"></button>

          <!-- If NOT signed in: show Login & Sign Up -->
          {% if not current_email %}
            <button
              class="btn outline"
              @click="showModal = true"
              hx-get="/auth/partials/login"
              hx-target="#global-modal-body"
              hx-swap="innerHTML"
            >Log in</button>

            <button
              class="btn"
              @click="showModal = true"
              hx-get="/auth/partials/sign-up"
              hx-target="#global-modal-body"
              hx-swap="innerHTML"
            >Sign up</button>
          {% else %}
          <!-- If signed in: show Settings menu -->
            <div class="dropdown" x-data="{ open:false }" @keydown.escape="open=false">
              <button class="btn" @click="open = !open">
                Settings ▾
              </button>
              <div class="menu" x-show="open" @click.outside="open=false" x-transition>
                <button
                  class="menu-item"
                  @click="open=false; showModal=true"
                  hx-get="/settings/partials/account"
                  hx-target="#global-modal-body"
                  hx-swap="innerHTML"
                >
                  Account Settings
                </button>
                <button
                  class="menu-item"
                  @click="open=false; showModal=true"
                  hx-get="/settings/partials/agenda"
                  hx-target="#global-modal-body"
                  hx-swap="innerHTML"
                >
                  Agenda Settings
                </button>
                <a class="menu-item" href="/settings">Open full Settings page</a>
              </div>
            </div>

            <!-- (Optional) tiny avatar / email display -->
            <span class="muted" title="Signed in as">{{ current_email }}</span>
          {% endif %}
        </div>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="container muted">
      <p>Served by FastAPI. Updates via HTMX. Sprinkles by Alpine.</p>
    </footer>

    <!-- Global Modal (reused for login, signup, and settings partials) -->
    <div
      class="modal-backdrop"
      x-show="showModal"
      x-transition.opacity
      style="display:none"
      @keydown.escape="showModal=false"
    >
      <div class="modal card" @click.outside="showModal=false" x-trap.noscroll="showModal">
        <div class="row between items-center mb">
          <h3 class="m-0">Panel</h3>
          <button class="btn danger" @click="showModal=false">Close</button>
        </div>

        <!-- HTMX injects partials here -->
        <div id="global-modal-body">
          <!-- Content loaded via hx-get -->
        </div>
      </div>
    </div>

    <!-- HTMX loading indicator (optional) -->
    <div id="htmx-indicator" class="htmx-indicator">Loading…</div>
    <script>
      document.body.addEventListener('htmx:configRequest', function(evt){
        // add headers or CSRF here if needed
      });
    </script>
  </body>
</html>
