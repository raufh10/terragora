{% extends "base.html" %}
{% block content %}
<section class="card"
         x-data="{ panel: 'login' }">

  <h2>Account</h2>

  <!-- Swappable content panel -->
  <div id="account-panel"
       class="mt"
       hx-target="#account-panel"
       hx-swap="innerHTML"
       hx-on::after-swap="
         const p = event.detail?.pathInfo?.requestPath || '';
         if (p.includes('sign-up'))      panel = 'sign-up';
         else if (p.includes('forgot'))  panel = 'forgot';
         else                             panel = 'login';
       ">
    {# Default panel #}
    {% include "partials/login.html" %}
  </div>

  <!-- Loading indicator -->
  <div id="account-indicator" class="muted mt" style="display:none;">Working…</div>

</section>
{% endblock %}
